<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Progress HQ</title>
<style>
/* ============================================================
   Progress HQ — personal progress command center
   Clean dark mode · elegant minimal × pro analytics
   ============================================================ */
:root{
  --bg:#0d0d0d;
  --surface:#1a1a19;
  --surface-2:#222221;
  --surface-3:#2a2a28;
  --ink:#ffffff;
  --ink-2:#c3c2b7;
  --muted:#898781;
  --grid:#2c2c2a;
  --axis:#383835;
  --border:rgba(255,255,255,.10);
  --border-soft:rgba(255,255,255,.06);
  --health:#3987e5;
  --money:#199e70;
  --business:#c98500;
  --learning:#008300;
  --accent:#3987e5;
  --good:#0ca30c;
  --warn:#fab219;
  --serious:#ec835a;
  --crit:#d03b3b;
  --radius:12px;
  --radius-sm:8px;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--sans);
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;font-size:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:inherit;color:var(--ink)}
a{color:var(--accent);text-decoration:none}
::selection{background:rgba(57,135,229,.35)}

/* ---------- layout ---------- */
#app{display:flex;min-height:100vh}
#sidebar{
  width:216px;flex:0 0 216px;
  background:#131312;
  border-right:1px solid var(--border-soft);
  padding:20px 12px;
  position:sticky;top:0;height:100vh;overflow-y:auto;
  display:flex;flex-direction:column;gap:2px;
}
#main{flex:1;min-width:0;padding:28px 32px 64px;max-width:1160px}

.brand{display:flex;align-items:center;gap:10px;padding:4px 10px 18px}
.brand-mark{
  width:26px;height:26px;border-radius:7px;flex:0 0 26px;
  background:linear-gradient(135deg,#3987e5,#1c5cab);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:13px;color:#fff;
}
.brand-name{font-weight:650;font-size:15px;letter-spacing:.01em}

.nav-section{font-size:10.5px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);padding:14px 10px 5px}
.nav-item{
  display:flex;align-items:center;gap:9px;
  padding:7px 10px;border-radius:8px;
  color:var(--ink-2);font-weight:480;text-align:left;width:100%;
  border:1px solid transparent;
}
.nav-item:hover{background:rgba(255,255,255,.045);color:var(--ink)}
.nav-item.active{background:rgba(255,255,255,.07);color:var(--ink);font-weight:600}
.nav-item .nav-dot{width:7px;height:7px;border-radius:50%;flex:0 0 7px;background:var(--muted);opacity:.55}
.nav-item.active .nav-dot{opacity:1}
.nav-dot.c-health{background:var(--health)}
.nav-dot.c-money{background:var(--money)}
.nav-dot.c-business{background:var(--business)}
.nav-dot.c-learning{background:var(--learning)}
.nav-dot.c-plain{background:var(--muted)}

/* ---------- page chrome ---------- */
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.page-title{font-size:21px;font-weight:650;letter-spacing:-.01em}
.page-sub{color:var(--muted);font-size:13px;margin-top:2px}
.head-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

.card{
  background:var(--surface);
  border:1px solid var(--border-soft);
  border-radius:var(--radius);
  padding:18px 20px;
}
.card + .card{margin-top:16px}
.card-title{font-size:13px;font-weight:600;color:var(--ink-2);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.card-title .t{display:flex;align-items:center;gap:8px}
.grid{display:grid;gap:16px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-4{grid-template-columns:repeat(4,1fr)}
.section-gap{margin-top:16px}

/* ---------- chips, tags, misc ---------- */
.chip{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;font-weight:600;color:var(--ink-2);
  padding:2px 8px;border-radius:20px;
  background:rgba(255,255,255,.05);border:1px solid var(--border-soft);
  white-space:nowrap;
}
.chip .dot{width:6px;height:6px;border-radius:50%}
.tag{font-size:10.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
.hr{border:none;border-top:1px solid var(--border-soft);margin:14px 0}
.empty{
  color:var(--muted);font-size:13px;padding:18px 4px;text-align:center;
}
.empty b{color:var(--ink-2);font-weight:600}

/* ---------- buttons & forms ---------- */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 13px;border-radius:8px;font-weight:560;font-size:13px;
  background:rgba(255,255,255,.06);border:1px solid var(--border-soft);color:var(--ink);
  transition:background .12s;
}
.btn:hover{background:rgba(255,255,255,.10)}
.btn.primary{background:var(--accent);border-color:transparent;color:#fff}
.btn.primary:hover{background:#2a78d6}
.btn.danger{color:#e66767}
.btn.small{padding:3px 9px;font-size:12px;border-radius:7px}
.btn.ghost{background:transparent;border-color:transparent;color:var(--muted)}
.btn.ghost:hover{color:var(--ink);background:rgba(255,255,255,.06)}
.btn:focus-visible,.nav-item:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{
  outline:2px solid var(--accent);outline-offset:1px;
}
.icon-btn{padding:4px 7px;border-radius:7px;color:var(--muted);font-size:14px;line-height:1}
.icon-btn:hover{background:rgba(255,255,255,.07);color:var(--ink)}

input[type=text],input[type=number],input[type=date],select,textarea{
  background:var(--surface-2);
  border:1px solid var(--border-soft);
  border-radius:8px;padding:7px 10px;width:100%;
  color:var(--ink);
}
input[type=number]{font-variant-numeric:tabular-nums}
textarea{resize:vertical;min-height:70px}
label.f{display:block;font-size:12px;font-weight:600;color:var(--ink-2);margin-bottom:4px}
.f-row{margin-bottom:12px}
.f-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
input[type=range]{width:100%;accent-color:var(--accent)}

/* ---------- stat tiles ---------- */
.tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.tile{
  background:var(--surface);border:1px solid var(--border-soft);
  border-radius:var(--radius);padding:14px 16px 12px;
  display:flex;flex-direction:column;gap:2px;min-width:0;
}
.tile .t-label{font-size:12px;color:var(--muted);font-weight:550;display:flex;justify-content:space-between;align-items:center;gap:6px}
.tile .t-value{font-size:24px;font-weight:640;letter-spacing:-.01em;line-height:1.25}
.tile .t-delta{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px;min-height:18px}
.tile .t-delta .d-up{color:var(--good);font-weight:600}
.tile .t-delta .d-down{color:var(--serious);font-weight:600}
.tile .t-delta .d-flat{color:var(--muted);font-weight:600}
.tile svg.spark{margin-top:6px;display:block}
.tile .t-sub{font-size:11.5px;color:var(--muted)}

/* ---------- progress rings ---------- */
.rings{display:flex;gap:10px;flex-wrap:wrap}
.ring-card{
  flex:1;min-width:150px;
  background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius);
  padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;
  transition:background .12s;
}
.ring-card:hover{background:var(--surface-2)}
.ring-wrap{position:relative;flex:0 0 auto}
.ring-center{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-weight:650;font-size:15px;
}
.ring-meta .r-name{font-weight:600;font-size:13.5px}
.ring-meta .r-sub{font-size:11.5px;color:var(--muted);margin-top:1px}

/* ---------- progress bars ---------- */
.pbar{height:6px;border-radius:4px;overflow:hidden;position:relative}
.pbar .pb-fill{height:100%;border-radius:4px;transition:width .4s ease}

/* ---------- goals ---------- */
.goal-list{display:flex;flex-direction:column;gap:10px}
.goal-card{
  background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius);
  padding:14px 16px;
}
.goal-card.completed{opacity:.62}
.goal-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
.goal-name{font-weight:600;font-size:14px}
.goal-meta{display:flex;align-items:center;gap:7px;margin-top:3px;flex-wrap:wrap}
.goal-nums{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;color:var(--muted);margin-top:6px;gap:8px;font-variant-numeric:tabular-nums}
.goal-nums b{color:var(--ink-2);font-weight:620}
.goal-actions{display:flex;gap:4px;flex:0 0 auto}
.milestones{margin-top:10px;display:flex;flex-direction:column;gap:5px}
.ms-row{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--ink-2)}
.ms-row.done{color:var(--muted);text-decoration:line-through}
.ms-check{
  width:17px;height:17px;border-radius:5px;border:1.5px solid var(--axis);
  flex:0 0 17px;display:flex;align-items:center;justify-content:center;
  font-size:11px;color:#fff;
}
.ms-row.done .ms-check{background:var(--good);border-color:var(--good)}
.reached-banner{
  margin-top:10px;display:flex;align-items:center;justify-content:space-between;gap:10px;
  font-size:12.5px;color:var(--ink-2);
  background:rgba(12,163,12,.09);border:1px solid rgba(12,163,12,.25);
  padding:7px 11px;border-radius:8px;
}
@keyframes glowPulse{
  0%{box-shadow:0 0 0 0 rgba(12,163,12,.45)}
  70%{box-shadow:0 0 0 14px rgba(12,163,12,0)}
  100%{box-shadow:0 0 0 0 rgba(12,163,12,0)}
}
.glow-complete{animation:glowPulse 1.1s ease-out 2}

/* ---------- today panel ---------- */
.today-nav{display:flex;align-items:center;gap:10px}
.today-nav .td-date{font-weight:640;font-size:15px;min-width:170px;text-align:center}
.today-row{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:11px 4px;border-bottom:1px solid var(--border-soft);
}
.today-row:last-child{border-bottom:none}
.today-row .tr-left{display:flex;align-items:center;gap:11px;min-width:0}
.today-row .tr-name{font-weight:560;font-size:13.5px}
.today-row .tr-sub{font-size:11.5px;color:var(--muted);font-variant-numeric:tabular-nums}
.today-row.met .tr-name{color:var(--ink)}
.tr-ctrl{display:flex;align-items:center;gap:8px;flex:0 0 auto}
.check-btn{
  width:26px;height:26px;border-radius:8px;border:1.5px solid var(--axis);
  display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;
  transition:all .12s;
}
.check-btn.on{background:var(--good);border-color:var(--good)}
.step-btn{
  width:26px;height:26px;border-radius:8px;background:rgba(255,255,255,.06);
  border:1px solid var(--border-soft);font-size:15px;line-height:1;color:var(--ink-2);
}
.step-btn:hover{background:rgba(255,255,255,.10);color:var(--ink)}
.ctr-val{min-width:34px;text-align:center;font-weight:640;font-variant-numeric:tabular-nums}
.amt-input{width:74px !important;text-align:right;padding:5px 8px !important}
.unit-lbl{font-size:11.5px;color:var(--muted);min-width:30px}

/* ---------- insights ---------- */
.hl-strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.hl-card{
  background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius);
  padding:13px 15px;display:flex;gap:11px;align-items:flex-start;
}
.hl-icon{
  width:30px;height:30px;border-radius:8px;flex:0 0 30px;
  display:flex;align-items:center;justify-content:center;font-size:14px;
  background:rgba(255,255,255,.05);
}
.hl-text{font-size:13px;color:var(--ink-2);line-height:1.45}
.hl-text b{color:var(--ink);font-weight:620}
.hl-text .hl-sub{display:block;font-size:11.5px;color:var(--muted);margin-top:2px}
.corr-r{font-variant-numeric:tabular-nums;font-weight:640}
.footnote{font-size:11.5px;color:var(--muted);margin-top:14px}

/* ---------- tables ---------- */
table.data{width:100%;border-collapse:collapse;font-size:13px}
table.data th{
  text-align:left;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;
  color:var(--muted);padding:7px 10px;border-bottom:1px solid var(--border-soft);
}
table.data td{padding:8px 10px;border-bottom:1px solid var(--border-soft);color:var(--ink-2)}
table.data td.num,table.data th.num{text-align:right;font-variant-numeric:tabular-nums}
table.data tr:last-child td{border-bottom:none}
table.data td b{color:var(--ink);font-weight:620}

/* ---------- charts ---------- */
.chart-card .chart-box{position:relative}
.chart-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.chart-head .ch-title{font-size:13px;font-weight:600;color:var(--ink-2)}
.chart-head .ch-val{font-size:15px;font-weight:650;font-variant-numeric:initial}
.range-row{display:flex;gap:4px;flex-wrap:wrap}
.range-btn{
  padding:3px 10px;border-radius:7px;font-size:12px;font-weight:560;color:var(--muted);
  border:1px solid transparent;
}
.range-btn:hover{color:var(--ink);background:rgba(255,255,255,.05)}
.range-btn.active{background:rgba(255,255,255,.08);color:var(--ink);border-color:var(--border-soft)}
svg.line-chart{display:block;width:100%}
svg.line-chart text{font-family:var(--sans);font-size:10.5px;fill:var(--muted);font-variant-numeric:tabular-nums}
svg.line-chart .end-label{font-size:11px;font-weight:600;fill:var(--ink-2);font-variant-numeric:initial}
svg .gridline{stroke:var(--grid);stroke-width:1}
svg .baseline{stroke:var(--axis);stroke-width:1}
.chart-overlay{position:absolute;inset:0;touch-action:pan-y}
.chart-overlay:focus-visible{outline:2px solid var(--accent);outline-offset:-2px;border-radius:8px}

#tooltip{
  position:fixed;z-index:90;pointer-events:none;display:none;
  background:#242423;border:1px solid var(--border);border-radius:9px;
  padding:8px 11px;font-size:12px;box-shadow:0 6px 24px rgba(0,0,0,.45);
  max-width:240px;
}
#tooltip .tt-date{color:var(--muted);font-size:11px;margin-bottom:4px}
#tooltip .tt-row{display:flex;align-items:center;gap:7px}
#tooltip .tt-key{width:12px;height:0;border-top:2.5px solid;border-radius:2px;flex:0 0 12px}
#tooltip .tt-val{font-weight:650;color:var(--ink);font-variant-numeric:tabular-nums}
#tooltip .tt-name{color:var(--ink-2)}

/* compare bars */
.cmp-row{display:flex;flex-direction:column;gap:3px;margin-bottom:12px}
.cmp-label{font-size:12px;color:var(--ink-2);font-weight:560;display:flex;justify-content:space-between;gap:8px}
.cmp-label .cmp-delta{font-variant-numeric:tabular-nums}
.cmp-bars{display:flex;flex-direction:column;gap:2px}
.cmp-bar{height:11px;border-radius:0 4px 4px 0;min-width:2px;position:relative}
.cmp-bar .cb-val{
  position:absolute;left:100%;top:50%;transform:translateY(-50%);
  margin-left:7px;font-size:11px;color:var(--muted);white-space:nowrap;font-variant-numeric:tabular-nums;
}

/* ---------- skills ---------- */
.skill-row{margin-bottom:14px}
.skill-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;gap:8px}
.skill-name{font-weight:580;font-size:13.5px}
.skill-lvl{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}

/* ---------- reviews & wins ---------- */
.review-card{margin-bottom:12px}
.review-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px}
.review-rating{font-weight:650;font-size:15px}
.review-block{margin-top:8px}
.review-block .rb-label{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.review-block .rb-text{font-size:13px;color:var(--ink-2);white-space:pre-wrap}
.win-row{display:flex;gap:12px;padding:10px 2px;border-bottom:1px solid var(--border-soft);align-items:flex-start}
.win-row:last-child{border-bottom:none}
.win-date{font-size:11.5px;color:var(--muted);flex:0 0 78px;font-variant-numeric:tabular-nums;padding-top:1px}
.win-text{font-size:13.5px;color:var(--ink-2)}
.win-src{font-size:11px;color:var(--muted);margin-top:1px}
.month-hdr{font-size:12px;font-weight:600;color:var(--muted);margin:16px 0 4px;letter-spacing:.04em;text-transform:uppercase}
.month-hdr:first-child{margin-top:0}

/* ---------- modal ---------- */
#modal-root{position:fixed;inset:0;z-index:100;display:none}
#modal-root.open{display:block}
.modal-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.6)}
.modal{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:min(480px,calc(100vw - 32px));max-height:min(86vh,720px);overflow-y:auto;
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:22px 24px;box-shadow:0 20px 60px rgba(0,0,0,.55);
}
.modal-title{font-size:16px;font-weight:650;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;align-items:center}
.modal-foot .left{margin-right:auto}

/* ---------- toast ---------- */
#toast{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(8px);
  background:#242423;border:1px solid var(--border);border-radius:10px;
  padding:9px 16px;font-size:13px;font-weight:560;z-index:120;
  opacity:0;pointer-events:none;transition:opacity .18s,transform .18s;
  box-shadow:0 8px 30px rgba(0,0,0,.5);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ---------- responsive ---------- */
@media (max-width:920px){
  #app{flex-direction:column}
  #sidebar{
    width:100%;flex:none;height:auto;position:sticky;top:0;z-index:50;
    flex-direction:row;align-items:center;gap:4px;overflow-x:auto;overflow-y:hidden;
    padding:10px 12px;border-right:none;border-bottom:1px solid var(--border-soft);
  }
  .brand{padding:0 8px 0 2px}
  .brand-name{display:none}
  .nav-section{display:none}
  .nav-item{width:auto;white-space:nowrap;padding:6px 10px}
  #main{padding:20px 16px 56px}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
  .f-grid{grid-template-columns:1fr}
}
@media (prefers-reduced-motion:reduce){
  *{animation:none !important;transition:none !important}
}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar" aria-label="Navigation"></aside>
  <main id="main"></main>
</div>
<div id="tooltip" role="status" aria-hidden="true"></div>
<div id="modal-root"></div>
<div id="toast" role="status"></div>
<script>
"use strict";
/* ================= helpers ================= */
const $=(s,r=document)=>r.querySelector(s);
function h(tag,props,...children){
  const el=document.createElement(tag);
  if(props)for(const[k,v]of Object.entries(props)){
    if(v==null)continue;
    if(k==="class")el.className=v;
    else if(k==="dataset")Object.assign(el.dataset,v);
    else if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on")&&typeof v==="function")el.addEventListener(k.slice(2),v);
    else el.setAttribute(k,v);
  }
  for(const c of children.flat(Infinity)){
    if(c==null||c===false)continue;
    el.appendChild(c instanceof Node?c:document.createTextNode(String(c)));
  }
  return el;
}
const SVG_NS="http://www.w3.org/2000/svg";
function sv(tag,attrs,...children){
  const el=document.createElementNS(SVG_NS,tag);
  if(attrs)for(const[k,v]of Object.entries(attrs)){if(v!=null)el.setAttribute(k,v);}
  for(const c of children.flat(Infinity)){
    if(c==null||c===false)continue;
    el.appendChild(c instanceof Node?c:document.createTextNode(String(c)));
  }
  return el;
}
const uid=()=> "id"+Date.now().toString(36)+Math.random().toString(36).slice(2,8);
const clamp=(v,a,b)=>Math.min(b,Math.max(a,v));

/* ---------- dates (all local time) ---------- */
const DAY=86400000;
function dkey(d){ // Date -> "YYYY-MM-DD" local
  const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),dd=String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${dd}`;
}
function parseKey(k){const[y,m,d]=k.split("-").map(Number);return new Date(y,m-1,d);}
const todayKey=()=>dkey(new Date());
function addDays(k,n){const d=parseKey(k);d.setDate(d.getDate()+n);return dkey(d);}
function diffDays(a,b){ // b - a in days
  return Math.round((parseKey(b)-parseKey(a))/DAY);
}
function startOfWeek(k){ // respects settings.weekStart (1=Mon, 0=Sun)
  const ws=state.settings.weekStart??1;
  const d=parseKey(k);
  const shift=(d.getDay()-ws+7)%7;
  d.setDate(d.getDate()-shift);
  return dkey(d);
}
const monthKey=k=>k.slice(0,7);
function monthLabel(mk){const[y,m]=mk.split("-").map(Number);return new Date(y,m-1,1).toLocaleDateString(undefined,{month:"long",year:"numeric"});}
function fmtDate(k,opts){return parseKey(k).toLocaleDateString(undefined,opts||{month:"short",day:"numeric"});}
function fmtDateFull(k){return parseKey(k).toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric"});}
function weekLabel(wk){ // wk = week-start key
  const end=addDays(wk,6);
  return `${fmtDate(wk)} – ${fmtDate(end)}`;
}
function thisMonthKey(){return monthKey(todayKey());}
function lastMonthKey(){const d=new Date();d.setDate(1);d.setMonth(d.getMonth()-1);return dkey(d).slice(0,7);}

/* ---------- number formatting ---------- */
function fmtNum(v,dec=0){
  if(v==null||isNaN(v))return "–";
  return v.toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:dec});
}
function fmtCompact(v,dec=0){
  if(v==null||isNaN(v))return "–";
  const a=Math.abs(v);
  if(a>=1e6)return (v/1e6).toLocaleString(undefined,{maximumFractionDigits:1})+"M";
  if(a>=1e4)return (v/1e3).toLocaleString(undefined,{maximumFractionDigits:1})+"K";
  return fmtNum(v,dec);
}
function fmtVal(m,v,compact){ // format a value for metric m
  if(v==null||isNaN(v))return "–";
  const cur=m.unit==="$"?state.settings.currency:null;
  const n=compact?fmtCompact(v,m.decimals||0):fmtNum(v,m.decimals||0);
  if(cur)return cur==="kr"||cur==="SEK"?`${n} kr`:`${cur}${n}`;
  return m.unit?`${n} ${m.unit}`:n;
}
function fmtSigned(m,v,compact){
  if(v==null||isNaN(v))return "–";
  return (v>0?"+":v<0?"−":"±")+fmtVal(m,Math.abs(v),compact);
}

let state=null;
function loadState(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(raw){
      const s=JSON.parse(raw);
      if(s&&s.version===1&&Array.isArray(s.habits)){state=s;return;}
    }
  }catch(e){console.warn("Progress HQ: could not load saved data",e);}
  state=seedState();
  saveState();
}
let saveTimer=null;
function saveState(){
  try{localStorage.setItem(LS_KEY,JSON.stringify(state));}
  catch(e){console.error("Progress HQ: save failed",e);toast("⚠ Could not save — storage full?");}
}
function commit(msg){ // save + re-render current view
  saveState();
  render();
  if(msg)toast(msg);
}

/* ---------- store accessors ---------- */
const metricById=id=>state.metrics.find(m=>m.id===id);
const habitById=id=>state.habits.find(hb=>hb.id===id);
const skillById=id=>state.skills.find(s=>s.id===id);
function entriesOf(mid){return state.metricEntries[mid]||[];}
function upsertEntry(mid,d,v){
  const list=state.metricEntries[mid]||(state.metricEntries[mid]=[]);
  const i=list.findIndex(e=>e.d===d);
  if(v==null||v===""||isNaN(v)){if(i>=0)list.splice(i,1);}
  else if(i>=0)list[i].v=Number(v);
  else{list.push({d,v:Number(v)});list.sort((a,b)=>a.d<b.d?-1:1);}
}
function deleteEntry(mid,d){upsertEntry(mid,d,null);}
function habitVal(dayKey,hid){const day=state.habitLogs[dayKey];return day?day[hid]:undefined;}
function setHabitVal(dayKey,hid,v){
  const day=state.habitLogs[dayKey]||(state.habitLogs[dayKey]={});
  if(v==null||v===0||v===""||isNaN(v)){delete day[hid];if(!Object.keys(day).length)delete state.habitLogs[dayKey];}
  else day[hid]=Number(v);
}
function habitMet(dayKey,hb){
  const v=habitVal(dayKey,hb.id);
  if(v==null)return false;
  return hb.type==="check"?v>=1:v>=(hb.target||1);
}
function addWin(text,source){
  state.wins.unshift({d:todayKey(),text,source:source||""});
}
/* ================= calc ================= */
function metricLatest(mid){
  const es=entriesOf(mid);
  return es.length?es[es.length-1]:null;
}
function metricAvgDays(mid,days){ // avg of entries within last N days
  const from=addDays(todayKey(),-(days-1));
  const es=entriesOf(mid).filter(e=>e.d>=from);
  if(!es.length)return null;
  return es.reduce((s,e)=>s+e.v,0)/es.length;
}
function metricMonthSum(mid,mk){
  return entriesOf(mid).filter(e=>monthKey(e.d)===mk).reduce((s,e)=>s+e.v,0);
}
function metricMonthAgg(m,mk){ // aggregate a metric for a month per its agg type; null if no data
  const es=entriesOf(m.id).filter(e=>monthKey(e.d)===mk);
  if(!es.length)return null;
  if(m.agg==="sum")return es.reduce((s,e)=>s+e.v,0);
  if(m.agg==="last")return es[es.length-1].v;
  return es.reduce((s,e)=>s+e.v,0)/es.length; // avg
}
function goalValue(g){ // current measured value of a numeric goal
  if(g.skillId){const sk=skillById(g.skillId);return sk?sk.level:null;}
  if(!g.metricId)return null;
  if(g.measure==="avg7")return metricAvgDays(g.metricId,7);
  if(g.measure==="avg30")return metricAvgDays(g.metricId,30);
  if(g.measure==="msum")return metricMonthSum(g.metricId,thisMonthKey());
  const last=metricLatest(g.metricId);
  return last?last.v:null;
}
function goalStart(g){ // baseline for progress; explicit start, else first entry
  if(g.start!=null)return g.start;
  if(g.metricId){const es=entriesOf(g.metricId);if(es.length)return es[0].v;}
  return null;
}
function goalProgress(g){ // -> {pct 0..1 | null, cur, detail}
  if(g.type==="milestone"){
    const ms=g.milestones||[];
    const done=ms.filter(m=>m.done).length;
    return {pct:ms.length?done/ms.length:0,cur:done,detail:`${done} of ${ms.length} steps`};
  }
  if(g.type==="streak"){
    const st=streakForGoal(g);
    return {pct:null,cur:st.current,detail:st.detail,streak:st};
  }
  // numeric
  const cur=goalValue(g);
  if(cur==null)return {pct:0,cur:null,detail:"no data yet"};
  const m=g.metricId?metricById(g.metricId):null;
  const dir=m?m.dir:"up";
  const start=goalStart(g);
  let pct;
  if(dir==="down"){
    pct=cur<=g.target?1:(g.target>0&&cur>0?clamp(g.target/cur,0,1):0);
  }else if(start!=null&&start<g.target){ // baseline-relative only when the baseline is below the target
    pct=clamp((cur-start)/(g.target-start),0,1);
  }else{
    pct=g.target?clamp(cur/g.target,0,1):0;
  }
  return {pct,cur,detail:null};
}

/* ---------- streaks ---------- */
function habitDayStreak(hb){ // consecutive days met, ending today or yesterday
  let d=todayKey(),n=0;
  if(!habitMet(d,hb))d=addDays(d,-1); // today not yet logged doesn't break it
  while(habitMet(d,hb)){n++;d=addDays(d,-1);if(n>3650)break;}
  return n;
}
function habitBestStreak(hb){
  const days=Object.keys(state.habitLogs).filter(d=>habitMet(d,hb)).sort();
  let best=0,run=0,prev=null;
  for(const d of days){
    run=(prev&&diffDays(prev,d)===1)?run+1:1;
    if(run>best)best=run;
    prev=d;
  }
  return best;
}
function weekMetCount(hb,wk){ // sessions meeting target within week starting wk
  let n=0;
  for(let i=0;i<7;i++)if(habitMet(addDays(wk,i),hb))n++;
  return n;
}
function streakForGoal(g){ // weekly habit streak or monthly metric streak
  if(g.cadence==="monthly"&&g.metricId){
    // consecutive months with at least one entry
    const months=new Set(entriesOf(g.metricId).map(e=>monthKey(e.d)));
    let mk=thisMonthKey(),n=0;
    const prevMonth=k=>{const[y,m]=k.split("-").map(Number);const d=new Date(y,m-2,1);return dkey(d).slice(0,7);};
    const thisDone=months.has(mk);
    if(!thisDone)mk=prevMonth(mk);
    while(months.has(mk)){n++;mk=prevMonth(mk);if(n>600)break;}
    return {current:n,unit:"month",thisDone,
      detail:n?`${n} month${n>1?"s":""} in a row${thisDone?"":" — this month still open"}`:(thisDone?"1 month in a row":"not started — log this month")};
  }
  const hb=g.habitId?habitById(g.habitId):null;
  if(!hb)return {current:0,unit:"week",detail:"habit missing"};
  const per=g.perWeek||1;
  const thisWk=startOfWeek(todayKey());
  const thisCount=weekMetCount(hb,thisWk);
  let wk=thisCount>=per?thisWk:addDays(thisWk,-7),n=0;
  while(weekMetCount(hb,wk)>=per){n++;wk=addDays(wk,-7);if(n>520)break;}
  return {current:n,unit:"week",thisCount,per,
    detail:`${n} week${n===1?"":"s"} in a row · this week ${thisCount}/${per}`};
}

/* ---------- area scores ---------- */
function habitScore7(areaId){ // completion rate over trailing 7 days
  const hbs=state.habits.filter(hb=>!hb.archived&&hb.area===areaId);
  if(!hbs.length)return null;
  let met=0,tot=0;
  for(let i=0;i<7;i++){
    const d=addDays(todayKey(),-i);
    for(const hb of hbs){tot++;if(habitMet(d,hb))met++;}
  }
  return tot?met/tot:null;
}
function goalScore(areaId){
  const gs=state.goals.filter(g=>!g.completedAt&&g.area===areaId);
  const vals=[];
  for(const g of gs){
    const p=goalProgress(g);
    if(p.pct!=null)vals.push(p.pct);
    else if(p.streak){ // streak goals: this-period completion
      if(p.streak.unit==="week"&&p.streak.per)vals.push(clamp(p.streak.thisCount/p.streak.per,0,1));
      else vals.push(p.streak.thisDone?1:0);
    }
  }
  if(!vals.length)return null;
  return vals.reduce((a,b)=>a+b,0)/vals.length;
}
function trendScore(areaId){ // share of area metrics moving the right way over 30d
  const ms=state.metrics.filter(m=>m.area===areaId);
  const vals=[];
  for(const m of ms){
    const ch=change30(m);
    if(ch==null)continue;
    if(ch.delta===0)vals.push(.5);
    else vals.push((ch.delta>0)===(m.dir==="up")?1:0);
  }
  if(!vals.length)return null;
  return vals.reduce((a,b)=>a+b,0)/vals.length;
}
function areaScore(areaId){ // 0-100 from habits(50) goals(30) trends(20), reweighted if missing
  const parts=[[habitScore7(areaId),50],[goalScore(areaId),30],[trendScore(areaId),20]];
  let sum=0,wsum=0;
  for(const[v,w]of parts)if(v!=null){sum+=v*w;wsum+=w;}
  return wsum?Math.round(sum/wsum*100):null;
}

/* ---------- insights ---------- */
function change30(m){ // {delta, from, to} comparing latest vs ~30d-ago entry
  const es=entriesOf(m.id);
  if(es.length<2)return null;
  const last=es[es.length-1];
  const cutoff=addDays(todayKey(),-30);
  if(last.d<cutoff)return null; // stale
  let base=null;
  for(const e of es){if(e.d<=cutoff)base=e;else break;}
  if(!base)base=es[0];
  if(base.d===last.d)return null;
  return {delta:last.v-base.v,from:base,to:last,days:diffDays(base.d,last.d)};
}
function pearson(xs,ys){
  const n=xs.length;
  if(n<3)return null;
  const mx=xs.reduce((a,b)=>a+b,0)/n,my=ys.reduce((a,b)=>a+b,0)/n;
  let num=0,dx=0,dy=0;
  for(let i=0;i<n;i++){const a=xs[i]-mx,b=ys[i]-my;num+=a*b;dx+=a*a;dy+=b*b;}
  if(!dx||!dy)return null;
  return num/Math.sqrt(dx*dy);
}
function dailySeries(mid){ // map date->value for a metric
  const map={};for(const e of entriesOf(mid))map[e.d]=e.v;return map;
}
function habitSeries(hid){ // map date->logged value for amount/counter habits
  const map={};
  for(const[d,day]of Object.entries(state.habitLogs))if(day[hid]!=null)map[d]=day[hid];
  return map;
}
function computeCorrelations(){
  // candidate daily series: daily metrics + amount/counter habits
  const series=[];
  for(const m of state.metrics)if(m.daily)series.push({key:"m:"+m.id,name:m.name,map:dailySeries(m.id)});
  for(const hb of state.habits)if(!hb.archived&&hb.type!=="check")series.push({key:"h:"+hb.id,name:hb.name,map:habitSeries(hb.id)});
  const out=[];
  for(let i=0;i<series.length;i++)for(let j=i+1;j<series.length;j++){
    const A=series[i],B=series[j];
    const days=Object.keys(A.map).filter(d=>B.map[d]!=null);
    if(days.length<10)continue;
    const r=pearson(days.map(d=>A.map[d]),days.map(d=>B.map[d]));
    if(r==null||Math.abs(r)<0.4)continue;
    out.push({a:A.name,b:B.name,r,n:days.length});
  }
  out.sort((x,y)=>Math.abs(y.r)-Math.abs(x.r));
  return out.slice(0,8);
}
function computeHighlights(){
  const hl=[];
  // 30-day metric moves
  for(const m of state.metrics){
    const ch=change30(m);
    if(!ch||ch.delta===0)continue;
    const good=(ch.delta>0)===(m.dir==="up");
    hl.push({icon:good?"▲":"▼",good,
      text:[m.name," ",fmtSigned(m,ch.delta,true)," in ",ch.days,"d"],
      sub:`${fmtVal(m,ch.from.v,true)} → ${fmtVal(m,ch.to.v,true)}`,
      weight:Math.abs(ch.delta)/(Math.abs(ch.from.v)||1)});
  }
  // all-time records (needs history)
  for(const m of state.metrics){
    const es=entriesOf(m.id);
    if(es.length<5)continue;
    const last=es[es.length-1];
    const best=m.dir==="down"?Math.min(...es.map(e=>e.v)):Math.max(...es.map(e=>e.v));
    if(last.v===best&&last.d>=addDays(todayKey(),-7))
      hl.push({icon:"◆",good:true,text:[m.name,": ",m.dir==="down"?"all-time low":"all-time high"," — ",fmtVal(m,last.v,true)],sub:`${es.length} entries tracked`,weight:1.5});
  }
  // best month for sum metrics
  const tm=thisMonthKey();
  for(const m of state.metrics){
    if(m.agg!=="sum")continue;
    const months={};
    for(const e of entriesOf(m.id)){const mk=monthKey(e.d);months[mk]=(months[mk]||0)+e.v;}
    const keys=Object.keys(months);
    if(keys.length<2||!(tm in months))continue;
    if(m.dir==="up"&&months[tm]>=Math.max(...keys.map(k=>months[k])))
      hl.push({icon:"★",good:true,text:["Best month yet for ",m.name," — ",fmtVal(m,months[tm],true)],sub:monthLabel(tm),weight:1.4});
  }
  // habit streak records
  for(const hb of state.habits){
    if(hb.archived)continue;
    const cur=habitDayStreak(hb),best=habitBestStreak(hb);
    if(cur>=3&&cur>=best)
      hl.push({icon:"⚡",good:true,text:["Longest ",hb.name," streak yet — ",cur," days"],sub:"keep the chain alive",weight:1.2});
    else if(cur>=7)
      hl.push({icon:"⚡",good:true,text:[hb.name,": ",cur,"-day streak"],sub:`best ever: ${best} days`,weight:.8});
  }
  hl.sort((a,b)=>b.weight-a.weight);
  return hl.slice(0,8);
}

/* ================= charts ================= */
function niceTicks(min,max,count=4){
  if(min===max){max=min===0?1:min*1.1;min=min===0?0:min*0.9;}
  const span=max-min;
  const step0=span/count;
  const mag=Math.pow(10,Math.floor(Math.log10(step0)));
  const norm=step0/mag;
  const step=(norm<1.5?1:norm<3?2:norm<7?5:10)*mag;
  const lo=Math.floor(min/step)*step;
  const hi=Math.ceil(max/step)*step;
  const ticks=[];
  for(let v=lo;v<=hi+step*1e-6;v+=step)ticks.push(Math.round(v*1e9)/1e9);
  return {lo,hi:ticks[ticks.length-1],ticks};
}

  tooltip.style.display="block";

  let tx=x+14,ty=y-rect.height-10;
  if(tx+rect.width>window.innerWidth-8)tx=x-rect.width-14;

  tooltip.style.left=tx+"px";tooltip.style.top=ty+"px";
}

/* line chart: single- or multi-series, crosshair + tooltip, end label */
function lineChart(container,opts){
  const {points,color,fmt,height=180,showArea=true,name=""}=opts;
  container.replaceChildren();
  if(!points||points.length===0){
    container.appendChild(h("div",{class:"empty"},"No data yet — ",h("b",{},"log your first entry"),"."));
    return;
  }
  const W=Math.max(220,container.clientWidth||560);
  const lpv=points[points.length-1].v;
  const endText=fmt?fmt(lpv):fmtCompact(lpv,2);
  const padL=44,padR=Math.max(40,endText.length*6.8+16),padT=14,padB=26;
  const iw=W-padL-padR,ih=height-padT-padB;
  const svg=sv("svg",{class:"line-chart",viewBox:`0 0 ${W} ${height}`,width:W,height,role:"img","aria-label":name||"trend chart"});
  const vals=points.map(p=>p.v);
  const {lo,hi,ticks}=niceTicks(Math.min(...vals),Math.max(...vals));
  const t0=parseKey(points[0].d).getTime(),t1=parseKey(points[points.length-1].d).getTime();
  const X=d=>points.length===1?padL+iw/2:padL+(parseKey(d).getTime()-t0)/(t1-t0||1)*iw;
  const Y=v=>padT+ih-(v-lo)/(hi-lo||1)*ih;
  // gridlines + y labels
  for(const tv of ticks){
    const y=Y(tv);
    svg.appendChild(sv("line",{class:tv===lo?"baseline":"gridline",x1:padL,x2:W-padR,y1:y,y2:y}));
    svg.appendChild(sv("text",{x:padL-7,y:y+3.5,"text-anchor":"end"},fmtCompact(tv,2)));
  }
  // x labels: first, middle, last
  const xIdx=points.length>2?[0,Math.floor((points.length-1)/2),points.length-1]:points.map((_,i)=>i);
  for(const i of new Set(xIdx)){
    svg.appendChild(sv("text",{x:X(points[i].d),y:height-8,"text-anchor":i===0?"start":i===points.length-1?"end":"middle"},fmtDate(points[i].d)));
  }
  // area wash + line
  const pts=points.map(p=>`${X(p.d).toFixed(1)},${Y(p.v).toFixed(1)}`);
  if(points.length>1){
    if(showArea){
      const areaPath=`M${pts[0]} L${pts.join(" L")} L${X(points[points.length-1].d).toFixed(1)},${padT+ih} L${X(points[0].d).toFixed(1)},${padT+ih} Z`;
      svg.appendChild(sv("path",{d:areaPath,fill:color,opacity:"0.10"}));
    }
    svg.appendChild(sv("path",{d:`M${pts.join(" L")}`,fill:"none",stroke:color,"stroke-width":"2","stroke-linejoin":"round","stroke-linecap":"round"}));
  }
  // end dot with surface ring
  const lp=points[points.length-1];
  svg.appendChild(sv("circle",{cx:X(lp.d),cy:Y(lp.v),r:"4.5",fill:color,stroke:"var(--surface)","stroke-width":"2"}));
  // selective end label
  const endY=clamp(Y(lp.v)+4,padT+10,padT+ih-2);
  svg.appendChild(sv("text",{class:"end-label",x:X(lp.d)+9,y:endY},fmt?fmt(lp.v):fmtCompact(lp.v,2)));
  // crosshair group
  const cross=sv("g",{style:"display:none"});
  const vline=sv("line",{stroke:"var(--axis)","stroke-width":"1",y1:padT,y2:padT+ih});
  const hdot=sv("circle",{r:"5",fill:color,stroke:"var(--surface)","stroke-width":"2"});
  cross.append(vline,hdot);
  svg.appendChild(cross);

  const box=h("div",{class:"chart-box"});
  box.appendChild(svg);
  // overlay for pointer + keyboard
  let focusIdx=null;
  const overlay=h("div",{class:"chart-overlay",tabindex:"0",role:"application","aria-label":(name||"chart")+" — use arrow keys to read values"});
  function activate(i,clientX,clientY){
    const p=points[i];
    const x=X(p.d),y=Y(p.v);
    vline.setAttribute("x1",x);vline.setAttribute("x2",x);
    hdot.setAttribute("cx",x);hdot.setAttribute("cy",y);
    cross.style.display="";
    const r=svg.getBoundingClientRect();
    const sx=clientX!=null?clientX:r.left+x*(r.width/W);
    const sy=clientY!=null?clientY:r.top+y*(r.height/height);
    showTooltip(sx,sy,fmtDate(p.d,{weekday:"short",month:"short",day:"numeric"}),[{color,value:fmt?fmt(p.v):fmtNum(p.v,2),name}]);
  }
  function deactivate(){cross.style.display="none";hideTooltip();focusIdx=null;}
  overlay.addEventListener("pointermove",ev=>{
    const r=svg.getBoundingClientRect();
    const mx=(ev.clientX-r.left)*(W/r.width);
    let best=0,bd=Infinity;
    points.forEach((p,i)=>{const d=Math.abs(X(p.d)-mx);if(d<bd){bd=d;best=i;}});
    activate(best,ev.clientX,ev.clientY);
  });
  overlay.addEventListener("pointerleave",deactivate);
  overlay.addEventListener("keydown",ev=>{
    if(ev.key==="ArrowRight"||ev.key==="ArrowLeft"){
      ev.preventDefault();
      focusIdx=focusIdx==null?points.length-1:clamp(focusIdx+(ev.key==="ArrowRight"?1:-1),0,points.length-1);
      activate(focusIdx);
    }else if(ev.key==="Escape")deactivate();
  });
  overlay.addEventListener("blur",deactivate);
  box.appendChild(overlay);
  container.appendChild(box);
}

/* progress ring */
function ringSVG(pct,color,size=54,stroke=6,centerText){
  const r=(size-stroke)/2,c=size/2;
  const circ=2*Math.PI*r;
  const p=clamp(pct??0,0,1);
  const svg=sv("svg",{width:size,height:size,viewBox:`0 0 ${size} ${size}`,role:"img","aria-label":`${Math.round(p*100)}%`});
  svg.appendChild(sv("circle",{cx:c,cy:c,r,fill:"none",stroke:color,opacity:"0.16","stroke-width":stroke}));
  if(p>0)svg.appendChild(sv("circle",{cx:c,cy:c,r,fill:"none",stroke:color,"stroke-width":stroke,
    "stroke-linecap":"round","stroke-dasharray":`${(p*circ).toFixed(2)} ${circ.toFixed(2)}`,
    transform:`rotate(-90 ${c} ${c})`}));
  const wrap=h("span",{class:"ring-wrap"});
  wrap.appendChild(svg);
  wrap.appendChild(h("span",{class:"ring-center","aria-hidden":"true"},centerText!=null?centerText:Math.round(p*100)));
  return wrap;
}

/* sparkline: whole line muted, end dot in accent */
function sparkline(values,accent,w=150,ht=30){
  const svg=sv("svg",{class:"spark",width:w,height:ht,viewBox:`0 0 ${w} ${ht}`,"aria-hidden":"true"});
  if(values.length<2)return svg;
  const mn=Math.min(...values),mx=Math.max(...values);
  const X=i=>2+i/(values.length-1)*(w-8);
  const Y=v=>ht-4-(mx===mn?0.5:(v-mn)/(mx-mn))*(ht-8);
  const pts=values.map((v,i)=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`);
  svg.appendChild(sv("path",{d:`M${pts.join(" L")}`,fill:"none",stroke:"var(--muted)","stroke-width":"1.5",opacity:"0.7","stroke-linejoin":"round"}));
  svg.appendChild(sv("circle",{cx:X(values.length-1),cy:Y(values[values.length-1]),r:"3",fill:accent,stroke:"var(--surface)","stroke-width":"1.5"}));
  return svg;
}

/* thin horizontal progress bar */
function pbar(pct,color,track){
  const bar=h("div",{class:"pbar",style:{background:track||"rgba(255,255,255,.07)"}});
  bar.appendChild(h("div",{class:"pb-fill",style:{width:(clamp(pct??0,0,1)*100).toFixed(1)+"%",background:color}}));
  return bar;
}

function compareCard(metrics,a){

  for(const m of metrics){

  for(const r of rows){
    const max=Math.max(Math.abs(r.cur??0),Math.abs(r.prev??0))||1;
    const delta=(r.cur!=null&&r.prev!=null)?r.cur-r.prev:null;
    card.appendChild(h("div",{class:"cmp-row"},

function cmpBar(v,max,hex,alpha,label){

      h("button",{class:"btn",onclick:()=>$("#import-file").click()},"⬆ Import backup"),
      h("input",{type:"file",id:"import-file",accept:"application/json,.json",style:{display:"none"},onchange:importJSON})),
    h("div",{class:"footnote"},"Data lives in this browser's storage. Export regularly if it matters — an import fully replaces what's here.")));

  // manage habits
  const hbCard=h("div",{class:"card section-gap"},
    h("div",{class:"card-title"},h("span",{class:"t"},"Habits"),
      h("button",{class:"btn small ghost",onclick:()=>openHabitModal()},"+ add")));
  if(!state.habits.length)hbCard.appendChild(h("div",{class:"empty"},"No habits."));
  for(const hb of state.habits){
    hbCard.appendChild(h("div",{class:"today-row"},
      h("div",{class:"tr-left"},
        h("span",{style:{width:"7px",height:"7px",borderRadius:"50%",background:areaById(hb.area).color,flexShrink:"0"}}),
        h("div",{},
          h("div",{class:"tr-name",style:hb.archived?{color:"var(--muted)",textDecoration:"line-through"}:null},hb.name),
          h("div",{class:"tr-sub"},`${hb.type}${hb.type!=="check"?` · target ${fmtNum(hb.target)} ${hb.unit}`:""} · ${areaById(hb.area).name}${hb.archived?" · archived":""}`))),
      h("div",{class:"tr-ctrl"},
        h("button",{class:"icon-btn",title:"Edit","aria-label":"Edit "+hb.name,onclick:()=>openHabitModal(hb)},"✎"),
        h("button",{class:"btn small ghost",onclick:()=>{hb.archived=!hb.archived;commit(hb.archived?"Habit archived":"Habit restored");}},hb.archived?"restore":"archive"),
        h("button",{class:"icon-btn",title:"Delete","aria-label":"Delete "+hb.name,onclick:()=>{
          if(confirm(`Delete “${hb.name}” and all its logs?`)){
            state.habits=state.habits.filter(x=>x.id!==hb.id);
            for(const d of Object.keys(state.habitLogs)){delete state.habitLogs[d][hb.id];if(!Object.keys(state.habitLogs[d]).length)delete state.habitLogs[d];}
            state.goals=state.goals.filter(g=>g.habitId!==hb.id);
            commit("Habit deleted");
          }}},"✕"))));
  }
  main.appendChild(hbCard);

  // manage metrics
  const mtCard=h("div",{class:"card section-gap"},
    h("div",{class:"card-title"},h("span",{class:"t"},"Metrics"),
      h("button",{class:"btn small ghost",onclick:()=>openMetricModal()},"+ add")));
  for(const m of state.metrics){
    mtCard.appendChild(h("div",{class:"today-row"},
      h("div",{class:"tr-left"},
        h("span",{style:{width:"7px",height:"7px",borderRadius:"50%",background:areaById(m.area).color,flexShrink:"0"}}),
        h("div",{},
          h("div",{class:"tr-name"},m.name),
          h("div",{class:"tr-sub"},`${areaById(m.area).name} · ${m.unit||"number"} · ${m.agg==="sum"?"totals":m.agg==="last"?"level":"average"} · ${m.dir==="up"?"up is good":"down is good"}${m.daily?" · daily":""} · ${entriesOf(m.id).length} entries`))),
      h("div",{class:"tr-ctrl"},
        h("button",{class:"icon-btn",title:"Edit","aria-label":"Edit "+m.name,onclick:()=>openMetricModal(m)},"✎"),
        h("button",{class:"icon-btn",title:"Delete","aria-label":"Delete "+m.name,onclick:()=>{
          if(confirm(`Delete metric “${m.name}” and its ${entriesOf(m.id).length} entries?`)){
            state.metrics=state.metrics.filter(x=>x.id!==m.id);
            delete state.metricEntries[m.id];
            state.goals=state.goals.filter(g=>g.metricId!==m.id);
            commit("Metric deleted");
          }}},"✕"))));
  }
  main.appendChild(mtCard);

  // danger zone
  main.appendChild(h("div",{class:"card section-gap",style:{borderColor:"rgba(208,59,59,.35)"}},
    h("div",{class:"card-title"},h("span",{class:"t",style:{color:"var(--crit)"}},"Danger zone")),
    h("div",{style:{display:"flex",justifyContent:"space-between",gap:"12px",alignItems:"center",flexWrap:"wrap"}},
      h("div",{class:"t-sub",style:{color:"var(--muted)",fontSize:"12.5px"}},"Wipes everything and reloads the starter setup."),
      h("button",{class:"btn danger",onclick:()=>{
        if(confirm("Reset ALL data? This cannot be undone."))
          if(confirm("Last chance — every log, goal and review will be erased. Really reset?")){
            state=seedState();commit("Fresh start");
          }
      }},"Reset everything"))));
}
function exportJSON(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`progress-hq-backup-${todayKey()}.json`;
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),4000);
  toast("Backup exported");
}
function importJSON(ev){
  const file=ev.target.files&&ev.target.files[0];
  ev.target.value="";
  if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const s=JSON.parse(reader.result);
      if(!s||s.version!==1||!Array.isArray(s.habits)||!Array.isArray(s.metrics)||!Array.isArray(s.goals))
        throw new Error("Not a Progress HQ backup");
      if(!confirm("Import this backup? It replaces ALL current data."))return;
      // normalize optional collections so a hand-edited backup can't break rendering
      s.settings=Object.assign({currency:"$",weekStart:1},s.settings||{});
      if(!Array.isArray(s.skills))s.skills=[];
      if(!Array.isArray(s.wins))s.wins=[];
      if(!Array.isArray(s.reviews))s.reviews=[];
      if(typeof s.metricEntries!=="object"||!s.metricEntries)s.metricEntries={};
      if(typeof s.habitLogs!=="object"||!s.habitLogs)s.habitLogs={};
      state=s;
      commit("Backup imported");
    }catch(e){alert("Import failed: "+e.message);}
  };
  reader.readAsText(file);
}
/* ================= modal system ================= */
const modalRoot=$("#modal-root");
let modalKeyHandler=null;
function openModal(title,body,buttons){
  modalRoot.replaceChildren(
    h("div",{class:"modal-backdrop",onclick:closeModal}),
    h("div",{class:"modal",role:"dialog","aria-modal":"true","aria-label":title},
      h("div",{class:"modal-title"},h("span",{},title),
        h("button",{class:"icon-btn","aria-label":"Close dialog",onclick:closeModal},"✕")),
      body,
      h("div",{class:"modal-foot"},
        ...(buttons||[]).map(b=>h("button",{class:"btn"+(b.primary?" primary":"")+(b.danger?" danger":"")+(b.left?" left ghost":""),onclick:b.onclick},b.label)))));
  modalRoot.classList.add("open");
  modalKeyHandler=ev=>{if(ev.key==="Escape")closeModal();};
  document.addEventListener("keydown",modalKeyHandler);
  const first=modalRoot.querySelector("input,select,textarea,button.btn");
  if(first)first.focus();
}
function closeModal(){
  modalRoot.classList.remove("open");
  modalRoot.replaceChildren();
  if(modalKeyHandler){document.removeEventListener("keydown",modalKeyHandler);modalKeyHandler=null;}
}
function fld(label,input){return h("div",{class:"f-row"},h("label",{class:"f"},label),input);}
function areaSelect(value){
  return h("select",{},...AREAS.map(a=>h("option",{value:a.id,selected:value===a.id?"":null},a.name)));
}

/* ---------- entry modal ---------- */
function openEntryModal(m,presetDate){
  const dateInp=h("input",{type:"date",value:presetDate||todayKey(),max:todayKey()});
  const existing=entriesOf(m.id).find(e=>e.d===(presetDate||todayKey()));
  const valInp=h("input",{type:"number",step:"any",value:existing?existing.v:"",placeholder:m.unit==="$"?"amount":m.unit||"value"});
  dateInp.addEventListener("change",()=>{
    const e=entriesOf(m.id).find(x=>x.d===dateInp.value);
    valInp.value=e?e.v:"";
  });
  openModal("Log "+m.name,
    h("div",{},
      fld("Date",dateInp),
      fld(`Value${m.unit?` (${m.unit==="$"?state.settings.currency:m.unit})`:""}`,valInp)),
    [{label:"Cancel",onclick:closeModal},
     {label:"Save",primary:true,onclick:()=>{
        if(valInp.value===""||isNaN(Number(valInp.value))){valInp.focus();return;}
        if(!dateInp.value||dateInp.value>todayKey()){dateInp.focus();return;}
        upsertEntry(m.id,dateInp.value,Number(valInp.value));
        closeModal();commit(m.name+" logged");
     }}]);
  valInp.focus();
}

/* ---------- habit modal ---------- */
function openHabitModal(hb){
  const isNew=!hb;
  const nameInp=h("input",{type:"text",value:hb?hb.name:"",placeholder:"e.g. Morning pages"});
  const areaSel=areaSelect(hb?hb.area:"health");
  const typeSel=h("select",{},
    h("option",{value:"check",selected:hb&&hb.type==="check"?"":null},"Checkbox — done / not done"),
    h("option",{value:"counter",selected:hb&&hb.type==="counter"?"":null},"Counter — how many times"),
    h("option",{value:"amount",selected:hb&&hb.type==="amount"?"":null},"Amount — minutes, km, pages…"));
  const targetInp=h("input",{type:"number",step:"any",min:"0",value:hb?hb.target:10});
  const unitInp=h("input",{type:"text",value:hb?hb.unit:"",placeholder:"min / pages / calls"});
  const targetRow=h("div",{class:"f-grid"},
    h("div",{},h("label",{class:"f"},"Daily target"),targetInp),
    h("div",{},h("label",{class:"f"},"Unit"),unitInp));
  const syncTarget=()=>{targetRow.style.display=typeSel.value==="check"?"none":"";};
  typeSel.addEventListener("change",syncTarget);
  syncTarget();
  openModal(isNew?"New habit":"Edit habit",
    h("div",{},
      fld("Name",nameInp),
      h("div",{class:"f-grid"},
        h("div",{},h("label",{class:"f"},"Area"),areaSel),
        h("div",{},h("label",{class:"f"},"How it's logged"),typeSel)),
      h("div",{class:"f-row"},targetRow)),
    [{label:"Cancel",onclick:closeModal},
     {label:isNew?"Add habit":"Save",primary:true,onclick:()=>{
        const name=nameInp.value.trim();
        if(!name){nameInp.focus();return;}
        const type=typeSel.value;
        const target=type==="check"?1:Math.max(0,Number(targetInp.value)||1);
        if(isNew)state.habits.push({id:uid(),name,area:areaSel.value,type,target,unit:unitInp.value.trim(),createdAt:todayKey()});
        else Object.assign(hb,{name,area:areaSel.value,type,target,unit:unitInp.value.trim()});
        closeModal();commit(isNew?"Habit added":"Habit saved");
     }}]);
}

/* ---------- metric modal ---------- */
function openMetricModal(m,presetArea){
  const isNew=!m;
  const nameInp=h("input",{type:"text",value:m?m.name:"",placeholder:"e.g. Ad spend"});
  const areaSel=areaSelect(m?m.area:presetArea||"business");
  const unitInp=h("input",{type:"text",value:m?m.unit:"",placeholder:"$ / kg / h / followers"});
  const dirSel=h("select",{},
    h("option",{value:"up",selected:!m||m.dir==="up"?"":null},"Up is good"),
    h("option",{value:"down",selected:m&&m.dir==="down"?"":null},"Down is good"));
  const aggSel=h("select",{},
    h("option",{value:"avg",selected:!m||m.agg==="avg"?"":null},"Average — levels like weight, sleep"),
    h("option",{value:"sum",selected:m&&m.agg==="sum"?"":null},"Total — flows like revenue, hours"),
    h("option",{value:"last",selected:m&&m.agg==="last"?"":null},"Latest — balances like net worth"));
  const decSel=h("select",{},
    h("option",{value:"0",selected:!m||!m.decimals?"":null},"Whole numbers"),
    h("option",{value:"1",selected:m&&m.decimals===1?"":null},"1 decimal"),
    h("option",{value:"2",selected:m&&m.decimals===2?"":null},"2 decimals"));
  const dailyChk=h("input",{type:"checkbox",checked:m&&m.daily?"":null,style:{width:"auto",marginRight:"7px"}});
  openModal(isNew?"New metric":"Edit metric",
    h("div",{},
      fld("Name",nameInp),
      h("div",{class:"f-grid"},
        h("div",{},h("label",{class:"f"},"Area"),areaSel),
        h("div",{},h("label",{class:"f"},"Unit"),unitInp)),
      h("div",{class:"f-grid",style:{marginTop:"12px"}},
        h("div",{},h("label",{class:"f"},"Direction"),dirSel),
        h("div",{},h("label",{class:"f"},"Monthly roll-up"),aggSel)),
      h("div",{class:"f-grid",style:{marginTop:"12px"}},
        h("div",{},h("label",{class:"f"},"Precision"),decSel),
        h("div",{},h("label",{class:"f"},"Daily check-in"),
          h("label",{style:{display:"flex",alignItems:"center",fontSize:"13px",color:"var(--ink-2)",paddingTop:"7px",cursor:"pointer"}},dailyChk,"show in Today panel")))),
    [{label:"Cancel",onclick:closeModal},
     {label:isNew?"Add metric":"Save",primary:true,onclick:()=>{
        const name=nameInp.value.trim();
        if(!name){nameInp.focus();return;}
        const patch={name,area:areaSel.value,unit:unitInp.value.trim(),dir:dirSel.value,agg:aggSel.value,decimals:Number(decSel.value),daily:dailyChk.checked};
        if(isNew)state.metrics.push({id:uid(),...patch});
        else Object.assign(m,patch);
        closeModal();commit(isNew?"Metric added":"Metric saved");
     }}]);
}

/* ---------- skill modal ---------- */
function openSkillModal(sk){
  const isNew=!sk;
  const nameInp=h("input",{type:"text",value:sk?sk.name:"",placeholder:"e.g. Copywriting"});
  const lvl=h("input",{type:"range",min:"0",max:"100",step:"5",value:sk?sk.level:0,"aria-label":"Skill level percent"});
  const out=h("span",{class:"skill-lvl",style:{minWidth:"44px",textAlign:"right",fontWeight:"640",color:"var(--ink)"}},(sk?sk.level:0)+"%");
  lvl.addEventListener("input",()=>out.textContent=lvl.value+"%");
  openModal(isNew?"New skill":"Update skill",
    h("div",{},
      fld("Skill",nameInp),
      h("div",{class:"f-row"},h("label",{class:"f"},"Where are you? (0 = day one · 100 = mastery)"),
        h("div",{style:{display:"flex",gap:"14px",alignItems:"center"}},lvl,out))),
    [ ...(isNew?[]:[{label:"Delete",danger:true,left:true,onclick:()=>{
        if(confirm(`Delete skill “${sk.name}”?`)){
          state.skills=state.skills.filter(x=>x.id!==sk.id);
          state.goals=state.goals.filter(g=>g.skillId!==sk.id);
          closeModal();commit("Skill deleted");
        }}}]),
     {label:"Cancel",onclick:closeModal},
     {label:isNew?"Add skill":"Save",primary:true,onclick:()=>{
        const name=nameInp.value.trim();
        if(!name){nameInp.focus();return;}
        const level=clamp(Number(lvl.value),0,100);
        if(isNew){const ns={id:uid(),name,level,history:[{d:todayKey(),v:level}]};state.skills.push(ns);}
        else{sk.name=name;if(sk.level!==level){sk.level=level;(sk.history||(sk.history=[])).push({d:todayKey(),v:level});}}
        closeModal();commit(isNew?"Skill added":"Skill updated");
     }}]);
}

/* ---------- goal modal ---------- */
function openGoalModal(g,presetArea){
  const isNew=!g;
  const titleInp=h("input",{type:"text",value:g?g.title:"",placeholder:"e.g. First $10k month"});
  const areaSel=areaSelect(g?g.area:presetArea||"business");
  const typeSel=h("select",{},
    h("option",{value:"numeric",selected:!g||g.type==="numeric"?"":null},"Numeric target"),
    h("option",{value:"streak",selected:g&&g.type==="streak"?"":null},"Streak / consistency"),
    h("option",{value:"milestone",selected:g&&g.type==="milestone"?"":null},"Milestone checklist"));
  const hzSel=h("select",{},...HORIZONS.map(([v,l])=>h("option",{value:v,selected:(g?g.horizon:"monthly")===v?"":null},l)));
  const deadlineInp=h("input",{type:"date",value:g&&g.deadline?g.deadline:""});

  // numeric fields
  const srcSel=h("select",{}); // metric or skill
  function fillSrc(){
    srcSel.replaceChildren(
      ...state.metrics.map(m=>h("option",{value:"m:"+m.id,selected:g&&g.metricId===m.id?"":null},`${m.name} (${areaById(m.area).name})`)),
      ...state.skills.map(s=>h("option",{value:"s:"+s.id,selected:g&&g.skillId===s.id?"":null},`Skill: ${s.name}`)));
  }
  fillSrc();
  const measureSel=h("select",{},
    h("option",{value:"latest",selected:!g||g.measure==="latest"?"":null},"Latest value"),
    h("option",{value:"msum",selected:g&&g.measure==="msum"?"":null},"This month's total"),
    h("option",{value:"avg30",selected:g&&g.measure==="avg30"?"":null},"30-day average"),
    h("option",{value:"avg7",selected:g&&g.measure==="avg7"?"":null},"7-day average"));
  const targetInp=h("input",{type:"number",step:"any",value:g&&g.target!=null?g.target:""});
  const startInp=h("input",{type:"number",step:"any",value:g&&g.start!=null?g.start:"",placeholder:"auto (first entry)"});
  const numericBox=h("div",{},
    h("div",{class:"f-grid"},
      h("div",{},h("label",{class:"f"},"Tracks"),srcSel),
      h("div",{},h("label",{class:"f"},"Measured as"),measureSel)),
    h("div",{class:"f-grid",style:{marginTop:"12px"}},
      h("div",{},h("label",{class:"f"},"Target"),targetInp),
      h("div",{},h("label",{class:"f"},"Starting point (optional)"),startInp)));

  // streak fields
  const habitSel=h("select",{},...state.habits.filter(x=>!x.archived).map(hb=>h("option",{value:hb.id,selected:g&&g.habitId===hb.id?"":null},hb.name)));
  const perWeekInp=h("input",{type:"number",min:"1",max:"7",value:g&&g.perWeek?g.perWeek:4});
  const cadSel=h("select",{},
    h("option",{value:"weekly",selected:!g||g.cadence!=="monthly"?"":null},"Weekly — habit, N days per week"),
    h("option",{value:"monthly",selected:g&&g.cadence==="monthly"?"":null},"Monthly — log a metric every month"));
  const mtSel=h("select",{},...state.metrics.map(m=>h("option",{value:m.id,selected:g&&g.metricId===m.id?"":null},m.name)));
  const weeklyBox=h("div",{class:"f-grid",style:{marginTop:"12px"}},
    h("div",{},h("label",{class:"f"},"Habit"),habitSel),
    h("div",{},h("label",{class:"f"},"Days per week"),perWeekInp));
  const monthlyBox=h("div",{class:"f-row",style:{marginTop:"12px"}},h("label",{class:"f"},"Metric to log monthly"),mtSel);
  const streakBox=h("div",{},h("div",{class:"f-row"},h("label",{class:"f"},"Cadence"),cadSel),weeklyBox,monthlyBox);
  const syncCad=()=>{weeklyBox.style.display=cadSel.value==="weekly"?"":"none";monthlyBox.style.display=cadSel.value==="monthly"?"":"none";};
  cadSel.addEventListener("change",syncCad);syncCad();

  // milestone fields
  const msBox=h("div",{});
  const msRows=[];
  function addMsRow(text,done){
    const inp=h("input",{type:"text",value:text||"",placeholder:"Step "+(msRows.length+1)});
    const row=h("div",{style:{display:"flex",gap:"6px",marginBottom:"6px"}},inp,
      h("button",{class:"icon-btn","aria-label":"Remove step",onclick:()=>{row.remove();msRows.splice(msRows.indexOf(entry),1);}},"✕"));
    const entry={inp,done:!!done};
    msRows.push(entry);
    msBox.insertBefore(row,addBtn);
  }
  const addBtn=h("button",{class:"btn small ghost",onclick:()=>addMsRow()},"+ add step");
  msBox.appendChild(addBtn);
  const msWrap=h("div",{},h("label",{class:"f"},"Steps"),msBox);
  if(g&&g.milestones)for(const s of g.milestones)addMsRow(s.t,s.done);
  else{addMsRow();addMsRow();addMsRow();}

  const typeBoxes={numeric:numericBox,streak:streakBox,milestone:msWrap};
  const typeWrap=h("div",{class:"f-row"},numericBox,streakBox,msWrap);
  const syncType=()=>{for(const[k,box]of Object.entries(typeBoxes))box.style.display=typeSel.value===k?"":"none";};
  typeSel.addEventListener("change",syncType);syncType();

  openModal(isNew?"New goal":"Edit goal",
    h("div",{},
      fld("Goal",titleInp),
      h("div",{class:"f-grid"},
        h("div",{},h("label",{class:"f"},"Area"),areaSel),
        h("div",{},h("label",{class:"f"},"Type"),typeSel)),
      h("div",{class:"f-grid",style:{margin:"12px 0"}},
        h("div",{},h("label",{class:"f"},"Horizon"),hzSel),
        h("div",{},h("label",{class:"f"},"Deadline (optional)"),deadlineInp)),
      typeWrap),
    [ ...(!isNew&&g.completedAt?[{label:"Reopen",left:true,onclick:()=>{g.completedAt=null;closeModal();commit("Goal reopened");}}]:[]),
     {label:"Cancel",onclick:closeModal},
     {label:isNew?"Add goal":"Save",primary:true,onclick:()=>{
        const title=titleInp.value.trim();
        if(!title){titleInp.focus();return;}
        const type=typeSel.value;
        const base={title,area:areaSel.value,type,horizon:hzSel.value,deadline:deadlineInp.value||null};
        if(type==="numeric"){
          const tv=Number(targetInp.value);
          if(targetInp.value===""||isNaN(tv)){targetInp.focus();return;}
          const src=srcSel.value;
          base.metricId=src.startsWith("m:")?src.slice(2):null;
          base.skillId=src.startsWith("s:")?src.slice(2):null;
          base.measure=measureSel.value;
          base.target=tv;
          base.start=startInp.value===""?null:Number(startInp.value);
        }else if(type==="streak"){
          base.cadence=cadSel.value;
          if(cadSel.value==="weekly"){
            if(!habitSel.value){alert("Add a habit first — streak goals track a habit.");return;}
            base.habitId=habitSel.value;base.perWeek=clamp(Number(perWeekInp.value)||1,1,7);base.metricId=null;
          }else{base.metricId=mtSel.value;base.habitId=null;}
        }else{
          base.milestones=msRows.map(r=>({t:r.inp.value.trim(),done:r.done})).filter(s=>s.t);
          if(!base.milestones.length){alert("Add at least one step.");return;}
        }
        if(isNew)state.goals.push({id:uid(),createdAt:todayKey(),...base});
        else Object.assign(g,base);
        closeModal();commit(isNew?"Goal added":"Goal saved");
     }}]);
}

window.addEventListener("hashchange",render);
let resizeTimer=null;
window.addEventListener("resize",()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(render,150);});
loadState();
render();
